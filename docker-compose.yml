services:
  steosdemoMySql:
    image: mysql:8.0
    container_name: steosdemo_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: steosdemo
      MYSQL_DATABASE: steosdemo
      MYSQL_USER: steosdemo
      MYSQL_PASSWORD: steosdemo
    ports:
      - "3300:3306"
    volumes:
      - steosdemo_mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    networks:
      - steosdemo

  steosdemoMyadmin:
    image: phpmyadmin:latest
    container_name: steosdemo_phpmyadmin
    restart: unless-stopped
    depends_on:
      - steosdemoMySql
    environment:
      PMA_ARBITRARY: 1
      PMA_HOST: steosdemoMySql
      PMA_USER: steosdemo
      PMA_PASSWORD: steosdemo
      UPLOAD_LIMIT: 256M
      MEMORY_LIMIT: 512M
      MAX_EXECUTION_TIME: 3600
    ports:
      - "9081:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.steosdemoMyadmin.rule=Host(`steosdemoMyadmin.stesistemas.com`) || Host(`www.steosdemoMyadmin.stesistemas.com`)" # Troque pelo seu dominio ou subdominio
      - "traefik.http.routers.steosdemoMyadmin.entrypoints=websecure"
      - "traefik.http.routers.steosdemoMyadmin.tls.certresolver=le"
      - "traefik.http.services.steosdemoMyadmin.loadbalancer.server.port=80"
      - "traefik.http.routers.steosdemoMyadmin.tls=true"
    networks:
      - steosdemo

  steosdemo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: steosdemo
    depends_on:
      - steosdemoMySql
    restart: always
    command: >
      /bin/sh -c "php index.php tools migrate && if [ -f dados_banco_steosdemo/dados_steosdemo.sql ]; then
        echo 'Iniciando importacao automatica dos dados...';
        mysql -h steosdemoMySql -u steosdemo -psteosdemo --skip-ssl steosdemo -N -e \"SET FOREIGN_KEY_CHECKS=0; SELECT CONCAT('TRUNCATE TABLE ', table_name, ';') FROM information_schema.tables WHERE table_schema='steosdemo' AND table_name != 'migrations';\" > /tmp/truncate.sql &&
        mysql -h steosdemoMySql -u steosdemo -psteosdemo --skip-ssl steosdemo -e \"SET FOREIGN_KEY_CHECKS=0; SOURCE /tmp/truncate.sql;\" &&
        mysql -h steosdemoMySql -u steosdemo -psteosdemo --skip-ssl steosdemo < dados_banco_steosdemo/dados_steosdemo.sql &&
        mv dados_banco_steosdemo/dados_steosdemo.sql dados_banco_steosdemo/dados_steosdemo.sql.imported &&
        echo 'Importacao concluida com sucesso!';
      fi && apache2-foreground"
    ports:
      - "9080:80"
    volumes:
      # DESENVOLVIMENTO: mapeia código local diretamente
      - .:/var/www/html:cached # cached para melhor performance
      # PRODUÇÃO: volume separado para uploads se necessário
      # - steosdemo_data:/var/www/html:cached # cached para melhor performance
    networks:
      - steosdemo
    environment:
      - MYSQL_HOST=steosdemoMySql
      - MYSQL_USER=steosdemo
      - MYSQL_PASSWORD=steosdemo
      - MYSQL_DATABASE=steosdemo

      - CI_ENVIRONMENT=development # Ativa o modo debug do CodeIgniter 4
      #- APP_BASEURL=http://localhost:8080/ # Adicione esta linha (opcional, mas recomendado para CI4)
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.steosdemo.rule=Host(`steosdemo.stesistemas.com`)"
      - "traefik.http.routers.steosdemo.entrypoints=websecure"
      - "traefik.http.routers.steosdemo.tls=true"
      - "traefik.http.routers.steosdemo.tls.certresolver=le"

      # INSTRUÇÃO PARA O TRAEFIK:
      # A imagem php:7.4-apache roda internamente na porta 80
      - "traefik.http.services.steosdemo.loadbalancer.server.port=80"

networks:
  steosdemo:
    external: true
    #driver: bridge
volumes:
  steosdemo_mysql_data:
  steosdemo_data:
